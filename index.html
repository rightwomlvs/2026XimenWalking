<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026貍想教育節｜西門町走讀大富翁</title>
    <style>
        :root {
            /* 用戶指定色票 */
            --u-orange: #f29844;
            --u-white: #ffffff;
            --u-dark-gray: #585858;
            --u-light-gray: #d8d8d9;

            /* 任務卡風格霓虹色 */
            --neon-green: #3DFF3D; /* 控制板、起終點 */
            --neon-blue: #00E5FF;  /* 景點格霓虹藍 */
            --neon-pink: #FF3DAE;  /* 標題彩色霓虹用 */
            --neon-purple: #B45BFF; /* 起終點關卡用，與左側面板綠色區隔 */
            
            /* 背景設定 */
            --bg-color: #0A0A0E; /* 極深背景，襯托霓虹 */
            --panel-bg: #15151A; /* 面板底色 */
            --card-bg: #1A1A24;  /* 卡片底色 */
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--u-white);
            font-size: 16px;
        }

        h1 {
            text-align: center;
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.7);
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 2.2em;
            letter-spacing: 2px;
        }

        @keyframes neon-rainbow-flow {
            0%   { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }
        
        .main-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            max-width: 1450px;
            margin: 0 auto;
        }

        /* ---------------- 左側控制面板 (霓虹綠) ---------------- */
        .sidebar {
            flex: 1;
            min-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel-box {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 15px rgba(61, 255, 61, 0.3), inset 0 0 10px rgba(61, 255, 61, 0.1);
        }

        .panel-title {
            color: var(--neon-green);
            margin-top: 0;
            font-size: 1.4em;
            text-shadow: 0 0 8px rgba(61, 255, 61, 0.6);
            border-bottom: 1px solid rgba(61, 255, 61, 0.3);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .input-group { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 15px; 
            align-items: center; 
        }
        
        .input-group input {
            padding: 10px;
            border: 1px solid var(--neon-green);
            border-radius: 6px;
            flex: 1; 
            min-width: 0;
            background-color: #000; 
            color: #fff;
            font-size: 1em;
            box-shadow: inset 0 0 5px rgba(61, 255, 61, 0.2);
        }
        .input-group input::placeholder { color: rgba(61, 255, 61, 0.4); }

        .btn-green {
            padding: 10px 15px;
            background-color: transparent; 
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            white-space: nowrap;
            box-shadow: 0 0 8px rgba(61, 255, 61, 0.4);
            transition: all 0.3s ease;
        }
        .btn-green:hover:not(:disabled) {
            background-color: var(--neon-green);
            color: #000;
            box-shadow: 0 0 20px var(--neon-green);
        }
        .btn-green:disabled {
            border-color: var(--u-dark-gray);
            color: var(--u-dark-gray);
            box-shadow: none;
            cursor: not-allowed;
        }

        @keyframes dice-shake {
            0%, 100% { transform: rotate(-10deg) scale(1); }
            50% { transform: rotate(10deg) scale(1.15); }
        }
        .dice-rolling { animation: dice-shake 0.12s ease-in-out infinite; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1em;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--neon-green);
        }
        th, td {
            border-bottom: 1px solid rgba(61, 255, 61, 0.3);
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: rgba(61, 255, 61, 0.15);
            color: var(--neon-green);
        }

        /* ---------------- 地圖區塊 ---------------- */
        .map-header {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(61, 255, 61, 0.3);
            padding-bottom: 10px;
        }
        .map-header h3 {
            color: var(--neon-green);
            margin: 0;
            font-size: 1.4em;
            text-shadow: 0 0 8px rgba(61, 255, 61, 0.6);
            white-space: nowrap;
        }
        .map-container {
            width: 100%;
            height: 350px;
            background: var(--u-dark-gray);
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 10px rgba(61, 255, 61, 0.3);
        }
        iframe { width: 100%; height: 100%; border: none; }

        #historyPlayerSelect {
            background-color: #000;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 0.95em;
        }
        .history-entry {
            background: rgba(255, 255, 255, 0.04);
            border-left: 4px solid var(--neon-blue);
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 0.95em;
            line-height: 1.5;
            color: var(--u-light-gray);
        }
        .history-entry .step-num {
            color: var(--u-dark-gray);
            font-size: 0.85em;
            margin-right: 8px;
        }
        .history-detail {
            margin-top: 4px;
            font-size: 0.85em;
            color: var(--u-light-gray);
            opacity: 0.75;
            line-height: 1.4;
        }

        .fullscreen-map {
            position: fixed !important;
            top: 0; left: 0;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 9999;
            padding: 0 !important;
            border-radius: 0 !important;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
        }
        .fullscreen-map .map-container {
            flex-grow: 1;
            height: auto;
            border: none;
            border-radius: 0;
        }

        /* ---------------- 右側大富翁棋盤 ---------------- */
        .board-container {
            flex: 2;
            min-width: 700px;
            background: transparent;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 12px;
            aspect-ratio: 1 / 1;
        }

        /* 棋盤格子 - 任務卡風格 */
        .space {
            background: var(--card-bg);
            border: 2px solid #333;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
        }
        .space.active { 
            background-color: #2a2a2a; 
            transform: scale(1.05);
            z-index: 10;
        }

        .space-name {
            font-size: 1.3em;
            font-weight: bold;
            line-height: 1.3;
            color: var(--u-light-gray);
            z-index: 2;
        }
        .space-icon {
            font-size: 1.2em;
            margin-bottom: 5px;
        }

        /* 依據類型發光 */
        .spot { border-color: var(--neon-blue); box-shadow: inset 0 0 15px rgba(0, 229, 255, 0.1); }
        .spot .space-name { color: var(--neon-blue); text-shadow: 0 0 5px rgba(0, 229, 255, 0.5); }
        .spot.active { box-shadow: 0 0 20px var(--neon-blue), inset 0 0 20px rgba(0, 229, 255, 0.3); }

        .chance { border-color: var(--u-orange); box-shadow: inset 0 0 15px rgba(242, 152, 68, 0.1); }
        .chance .space-name { color: var(--u-orange); text-shadow: 0 0 5px rgba(242, 152, 68, 0.5); }
        .chance.active { box-shadow: 0 0 20px var(--u-orange), inset 0 0 20px rgba(242, 152, 68, 0.3); }

        .fate { border-color: var(--u-white); box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.1); }
        .fate .space-name { color: var(--u-white); text-shadow: 0 0 5px rgba(255, 255, 255, 0.5); }
        .fate.active { box-shadow: 0 0 20px var(--u-white), inset 0 0 20px rgba(255, 255, 255, 0.3); }

        .start-end { border-color: var(--neon-purple); box-shadow: inset 0 0 15px rgba(180, 91, 255, 0.1); }
        .start-end .space-name { color: var(--neon-purple); text-shadow: 0 0 5px rgba(180, 91, 255, 0.5); }
        .start-end.active { box-shadow: 0 0 20px var(--neon-purple), inset 0 0 20px rgba(180, 91, 255, 0.3); }
        
        /* 玩家棋子 */
        .tokens { 
            display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; 
            position: absolute; bottom: 8px; left: 0; width: 100%;
        }
        .player-token {
            width: 24px; height: 24px; color: #000; border-radius: 50%;
            line-height: 24px; font-size: 14px; font-weight: bold; text-align: center;
            box-shadow: 0 0 10px rgba(255,255,255,0.8); 
        }

        /* 棋盤座標定位 (口字型 5x5) */
        #space-0 { grid-column: 1; grid-row: 1; }
        #space-1 { grid-column: 2; grid-row: 1; }
        #space-2 { grid-column: 3; grid-row: 1; }
        #space-3 { grid-column: 4; grid-row: 1; }
        #space-4 { grid-column: 5; grid-row: 1; }
        #space-5 { grid-column: 5; grid-row: 2; }
        #space-6 { grid-column: 5; grid-row: 3; }
        #space-7 { grid-column: 5; grid-row: 4; }
        #space-8 { grid-column: 5; grid-row: 5; }
        #space-9 { grid-column: 4; grid-row: 5; }
        #space-10 { grid-column: 3; grid-row: 5; }
        #space-11 { grid-column: 2; grid-row: 5; }
        #space-12 { grid-column: 1; grid-row: 5; }
        #space-13 { grid-column: 1; grid-row: 4; }
        #space-14 { grid-column: 1; grid-row: 3; }
        #space-15 { grid-column: 1; grid-row: 2; }

        /* 中間傳統遊戲版面 */
        .center-deck-area {
            grid-column: 2 / 5;
            grid-row: 2 / 5;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .center-title {
            font-size: 2.2em;
            font-weight: 800;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-align: center;
            line-height: 1.4;
            background: linear-gradient(90deg,
                var(--neon-blue), var(--neon-pink), var(--u-orange),
                var(--neon-green), var(--neon-blue));
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            /* 較小、較少層的光暈，避免文字邊緣模糊 */
            text-shadow: 0 0 2px rgba(255,255,255,0.5), 0 0 6px rgba(0,229,255,0.35);
            animation: neon-rainbow-flow 9s linear infinite;
        }
        .card-decks {
            display: flex;
            gap: 40px;
            width: 100%;
            justify-content: center;
        }
        
        .deck {
            width: 130px;
            height: 85px;
            border-radius: 8px;
            background-color: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.5em;
            position: relative;
            transition: all 0.3s;
        }
        .chance-deck {
            color: var(--u-orange);
            border: 3px solid var(--u-orange);
            box-shadow: 0 0 15px rgba(242, 152, 68, 0.4);
            transform: rotate(-6deg);
        }
        .fate-deck {
            color: var(--u-white);
            border: 3px solid var(--u-white);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            transform: rotate(6deg);
        }
        
        .deck.highlight {
            animation: pulse-card 0.6s infinite alternate;
            z-index: 10;
        }
        @keyframes pulse-card {
            from { transform: scale(1) rotate(calc(var(--r, 0)*1deg)); filter: brightness(1); }
            to { transform: scale(1.15) rotate(calc(var(--r, 0)*1deg)); filter: brightness(1.5); box-shadow: 0 0 30px currentColor; }
        }

        /* 彈出視窗 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 10000;
        }
        .modal-content {
            background: var(--panel-bg); padding: 35px; border-radius: 12px; max-width: 600px; width: 90%;
            text-align: center; border: 2px solid var(--neon-blue); box-shadow: 0 0 30px rgba(0, 229, 255, 0.3);
        }
        .modal-content h2 { color: var(--u-white); margin-top: 0; font-size: 1.8em; letter-spacing: 2px;}
        
        .card-graphic {
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            font-size: 1.4em;
            font-weight: bold;
            color: var(--u-white);
            background: #222;
        }
        
        #modalQuestion { font-size: 1.25em; line-height: 1.6; margin: 20px 0; color: var(--u-light-gray); }
        
        .answer-box {
            display: none; margin-top: 20px; padding: 20px; background: rgba(0,0,0,0.5);
            border-left: 6px solid var(--neon-blue); text-align: left;
            font-size: 1.15em; line-height: 1.6; color: var(--u-white);
        }
        .controls { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }
        
        .modal button {
            padding: 12px 20px; background-color: transparent; border-radius: 6px;
            cursor: pointer; font-weight: bold; font-size: 1.1em; transition: all 0.3s;
        }
        .btn-outline-blue { color: var(--neon-blue); border: 2px solid var(--neon-blue); }
        .btn-outline-blue:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }
        
        .btn-outline-orange { color: var(--u-orange); border: 2px solid var(--u-orange); }
        .btn-outline-orange:hover { background: var(--u-orange); color: #000; box-shadow: 0 0 15px var(--u-orange); }
        
        .btn-outline-gray { color: var(--u-light-gray); border: 2px solid var(--u-dark-gray); }
        .btn-outline-gray:hover { background: var(--u-dark-gray); color: #fff; }

        .btn-outline-purple { color: var(--neon-purple); border: 2px solid var(--neon-purple); }
        .btn-outline-purple:hover { background: var(--neon-purple); color: #000; box-shadow: 0 0 15px var(--neon-purple); }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="sidebar">
        <div class="panel-box">
            <h3 class="panel-title">1. 玩家報到 (身心估點)</h3>
            <div class="input-group">
                <input type="text" id="playerName" placeholder="姓名 / 暱稱">
                <input type="number" id="playerEnergy" placeholder="估點(1-10)" min="1" max="10" style="max-width: 90px;">
                <button class="btn-green" onclick="addPlayer()">加 入</button>
            </div>
            
            <table id="playerTable">
                <thead>
                    <tr>
                        <th>玩家</th>
                        <th>估點</th>
                        <th>方石</th>
                        <th>位置</th>
                    </tr>
                </thead>
                <tbody id="playerList"></tbody>
            </table>

            <h3 class="panel-title" style="margin-top: 30px;">2. 進行走讀</h3>
            <p id="turnIndicator" style="font-weight: bold; color: #fff; font-size: 1.15em; margin-bottom: 15px;">請先加入玩家！</p>
            <div id="diceDisplay" style="font-size: 3.2em; text-align: center; margin-bottom: 10px; min-height: 1.2em; color: var(--neon-green); text-shadow: 0 0 12px rgba(61,255,61,0.6);">🎲</div>
            <button id="rollBtn" class="btn-green" onclick="rollDice()" style="width: 100%; padding: 15px; font-size: 1.2em;" disabled>🎲 擲骰子前進</button>
        </div>

        <div class="panel-box" id="historyBox">
            <div class="map-header">
                <h3>📜 玩家路線紀錄</h3>
                <select id="historyPlayerSelect" onchange="renderHistory()"></select>
            </div>
            <div id="historyLog" style="max-height: 260px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;">
                <p style="color: var(--u-light-gray); text-align:center; margin:0;">尚無紀錄，加入玩家並開始走讀吧！</p>
            </div>
        </div>

        <div class="panel-box" id="mapBox" style="padding: 15px; display: flex; flex-direction: column; flex-grow: 1;">
            <div class="map-header">
                <h3>📍 實景地圖導覽</h3>
                <button id="fullscreenBtn" class="btn-green" onclick="toggleMapFullscreen()" style="padding: 6px 12px; font-size: 0.9em;">🔍 全螢幕</button>
            </div>
            <div class="map-container">
                <iframe id="gmap" src="https://maps.google.com/maps?q=25.0435,121.5015&hl=zh-TW&z=16&output=embed"></iframe>
            </div>
        </div>
    </div>

    <div class="board-container" id="gameBoard">
        <div class="center-deck-area">
            <div class="center-title">2026貍想教育節<br>西門町走讀大富翁</div>
            <div class="card-decks">
                <div class="deck chance-deck" id="deck-chance" style="--r: -6;">機 會</div>
                <div class="deck fate-deck" id="deck-fate" style="--r: 6;">命 運</div>
            </div>
        </div>
        </div>
</div>

<div class="modal" id="eventModal">
    <div class="modal-content">
        <h2 id="modalTitle">標題</h2>
        <div id="cardGraphic" class="card-graphic">卡片類型</div>
        <p id="modalQuestion"></p>
        
        <div id="answerBox" class="answer-box">
            <strong id="answerTitle" style="color: var(--neon-blue); font-size: 1.1em;">💡 解答 / 引導提示：</strong>
            <p id="modalAnswer" style="margin-top: 10px; margin-bottom: 0;"></p>
        </div>

        <div class="controls">
            <button id="showAnswerBtn" class="btn-outline-blue" onclick="showAnswer()">查看提示 / 解答</button>
            <button id="rewardBtn" class="btn-outline-orange" onclick="awardStone()">🎁 分享完畢！得 1 方石</button>
            <button onclick="closeModal()" class="btn-outline-gray">關閉</button>
        </div>
    </div>
</div>

<script>
    // 關卡座標與類型設定
    const boardSpaces = [
        { type: 'start-end', name: 'Meander<br>Taipei', lat: 25.0435, lng: 121.5015, icon: '🏠' },
        { type: 'chance', name: '機 會', lat: null, lng: null, icon: '❓' },

        { type: 'spot', name: '西門景點', lat: null, lng: null, icon: '📍' },
        { type: 'chance', name: '機 會', lat: null, lng: null, icon: '❓' },
        { type: 'spot', name: '西門景點', lat: null, lng: null, icon: '📍' },
        { type: 'start-end', name: 'CollaPlay<br>(終點)', lat: 25.0430, lng: 121.5060, icon: '🏁' }
    ];

    // 機會卡牌池 (貍想學院敏捷與核心概念)
    const chanceCards = [
        { title: '【張力會議 Tension】', q: '「張力不是壓力，而是看見需求。」請分享一個近期在專案或生活中遇到的張力（預期與現實的落差），你當時是如何處理的？', a: '試著運用非暴力溝通，將情緒抽離並轉化為具體的機制調整需求。' },

    let players = [];
    let currentPlayerIndex = 0;
    let gameEnded = false;

    // 記錄已經抽過的機會/命運/景點，避免重複，抽完一輪才重新洗牌
    let usedChanceIndices = new Set();
    let usedFateIndices = new Set();
    let usedSpotIndices = new Set();

    function drawUnique(pool, usedSet) {
        if (usedSet.size >= pool.length) {
            usedSet.clear(); // 該類別都抽過一輪了，重新洗牌
        }
        let idx;
        do {
            idx = Math.floor(Math.random() * pool.length);
        } while (usedSet.has(idx));
        usedSet.add(idx);
        return pool[idx];
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }
    // 使用高飽和度顏色做為棋子
    const colors = ['#f29844', '#00E5FF', '#3DFF3D', '#FF007F', '#B45BFF', '#FFD700'];

    window.addEventListener('DOMContentLoaded', initBoard);

    function initBoard() {
        const boardEl = document.getElementById('gameBoard');
        if (!boardEl) return;
        
        boardSpaces.forEach((space, index) => {
            const div = document.createElement('div');
            div.className = `space ${space.type}`;
            div.id = `space-${index}`;
            
            // 簡化格子內容，極大化字體
            div.innerHTML = `
                <div class="space-icon">${space.icon}</div>
                <div class="space-name">${space.name}</div>
                <div class="tokens" id="tokens-${index}"></div>
            `;
            boardEl.appendChild(div);
        });
    }

    // 加入玩家
    function addPlayer() {
        const name = document.getElementById('playerName').value;
        const energy = document.getElementById('playerEnergy').value;
        if (!name || !energy) { alert('請輸入姓名與身心估點！'); return; }

        players.push({
            id: players.length,
            name: name,
            energy: parseInt(energy),
            stones: 0,
            position: 0,
            color: colors[players.length % colors.length],
            history: []
        });

        document.getElementById('playerName').value = '';
        document.getElementById('playerEnergy').value = '';
        
        updateUI();
        refreshHistorySelect();
        if (players.length > 0 && !gameEnded) {
            document.getElementById('rollBtn').disabled = false;
            updateTurnIndicator();
        }
    }

    // 擲骰子
    const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

    async function rollDice() {
        if (players.length === 0 || gameEnded) return;
        const rollBtn = document.getElementById('rollBtn');
        const diceDisplay = document.getElementById('diceDisplay');
        rollBtn.disabled = true;

        document.getElementById('deck-chance').classList.remove('highlight');
        document.getElementById('deck-fate').classList.remove('highlight');

        // 1) 骰子跳動動畫，最後停在真正擲出的點數
        diceDisplay.classList.add('dice-rolling');
        for (let i = 0; i < 10; i++) {
            const tempRoll = Math.floor(Math.random() * 6) + 1;
            diceDisplay.innerText = diceFaces[tempRoll - 1];
            rollBtn.innerText = `🎲 擲骰中... ${tempRoll}`;
            await sleep(60);
        }
        diceDisplay.classList.remove('dice-rolling');

        const diceRoll = Math.floor(Math.random() * 6) + 1;
        diceDisplay.innerText = diceFaces[diceRoll - 1];
        rollBtn.innerText = `🎲 擲出了 ${diceRoll} 步！`;

        let player = players[currentPlayerIndex];
        const finishIndex = boardSpaces.length - 1; // 終點格（恰好停下才算抵達）
        const newPosition = player.position + diceRoll;
        const reachedFinish = (newPosition === finishIndex);

        await sleep(500);

        // 2) 一步一步往前走，讓玩家確實感受到經過的每一格
        for (let step = 0; step < diceRoll; step++) {
            player.position = (player.position + 1) % boardSpaces.length;
            updateUI();
            await sleep(380);
        }

        const currentSpace = boardSpaces[player.position];
        if (currentSpace.lat && currentSpace.lng) {
            updateMap(currentSpace.lat, currentSpace.lng);
        }

        if (currentSpace.type === 'chance') {
            document.getElementById('deck-chance').classList.add('highlight');
        } else if (currentSpace.type === 'fate') {
            document.getElementById('deck-fate').classList.add('highlight');
        }

        await sleep(500);
        triggerEvent(player, player.position);

        if (reachedFinish) {
            // 剛好停在終點：遊戲結束
            gameEnded = true;
            const turnIndicator = document.getElementById('turnIndicator');
            turnIndicator.innerText = `🎉 遊戲結束！${player.name} 剛好抵達終點，完成這次走讀！`;
            turnIndicator.style.color = 'var(--neon-purple)';
            turnIndicator.style.textShadow = '0 0 8px var(--neon-purple)';
            rollBtn.innerText = `🏁 遊戲已結束`;
            rollBtn.disabled = true;
        } else {
            // 沒剛好停在終點：超過格數則繼續下一圈
            currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
            updateTurnIndicator();
            rollBtn.disabled = false;
            rollBtn.innerText = `🎲 擲骰子前進 (1-6步)`;
        }
    }

    // 更新地圖
    function updateMap(lat, lng) {
        if(lat && lng) {
            const iframe = document.getElementById('gmap');
            iframe.src = `https://maps.google.com/maps?q=${lat},${lng}&hl=zh-TW&z=17&output=embed`;
        }
    }

        document.getElementById('mapBox').classList.toggle('fullscreen-map');
        const btn = document.getElementById('fullscreenBtn');
        if (document.getElementById('mapBox').classList.contains('fullscreen-map')) {
            btn.innerText = '❌ 關閉全螢幕';
        } else {
            btn.innerText = '🔍 全螢幕切換';
        }
    }

    // 觸發視窗事件
    function triggerEvent(player, pos) {
        const space = boardSpaces[pos];
        const cardGraphic = document.getElementById('cardGraphic');
        const answerBox = document.getElementById('answerBox');
        const showBtn = document.getElementById('showAnswerBtn');
        const answerTitle = document.getElementById('answerTitle');
        
        document.getElementById('modalTitle').innerText = `${player.name} 抵達`;
        answerBox.style.display = 'none';
        showBtn.style.display = 'inline-block';
        showBtn.className = '';

        // 用來記錄這一步走訪內容，結尾會寫入該玩家的路線紀錄
        let recordIcon = '📍';
        let recordColor = 'var(--neon-blue)';
        let recordLabel = '';
        let recordDetail = '';

        // 根據類型渲染 Modal 顏色與內容
        if (space.type === 'chance') {
            const card = drawUnique(chanceCards, usedChanceIndices);
            cardGraphic.innerText = `❓ 機 會 ❓\n\n${card.title}`;
            cardGraphic.style.border = '2px solid var(--u-orange)';
            cardGraphic.style.boxShadow = 'inset 0 0 15px rgba(242, 152, 68, 0.3), 0 0 10px rgba(242, 152, 68, 0.5)';
            cardGraphic.style.color = 'var(--u-orange)';
            document.getElementById('modalQuestion').innerText = card.q;
            document.getElementById('modalAnswer').innerText = card.a;
            
            showBtn.classList.add('btn-outline-orange');
            answerBox.style.borderLeftColor = 'var(--u-orange)';
            answerTitle.style.color = 'var(--u-orange)';

            recordIcon = '❓';
            recordColor = 'var(--u-orange)';
            recordLabel = `機會：${card.title.replace(/[【】]/g, '')}`;
            recordDetail = card.q;
            
        } else if (space.type === 'fate') {
            const card = drawUnique(fateCards, usedFateIndices);
            cardGraphic.innerText = `🔮 命 運 🔮\n\n${card.title}`;
            cardGraphic.style.border = '2px solid var(--u-white)';
            cardGraphic.style.boxShadow = 'inset 0 0 15px rgba(255, 255, 255, 0.3), 0 0 10px rgba(255, 255, 255, 0.5)';
            cardGraphic.style.color = 'var(--u-white)';
            document.getElementById('modalQuestion').innerText = card.q;
            document.getElementById('modalAnswer').innerText = card.a;

            showBtn.classList.add('btn-outline-gray'); // using gray outline as white might be too bright on hover
            answerBox.style.borderLeftColor = 'var(--u-white)';
            answerTitle.style.color = 'var(--u-white)';

            recordIcon = '🔮';
            recordColor = 'var(--u-white)';
            recordLabel = `命運：${card.title.replace(/[【】]/g, '')}`;
            recordDetail = card.q;
            
        } else {
            if (space.type === 'start-end') {
                cardGraphic.innerText = `📍 走讀景點：\n\n${space.name.replace('<br>', '')}`;
                cardGraphic.style.border = '2px solid var(--neon-purple)';
                cardGraphic.style.boxShadow = 'inset 0 0 15px rgba(180, 91, 255, 0.3), 0 0 10px rgba(180, 91, 255, 0.5)';
                cardGraphic.style.color = 'var(--neon-purple)';

                showBtn.classList.add('btn-outline-purple');
                answerBox.style.borderLeftColor = 'var(--neon-purple)';
                answerTitle.style.color = 'var(--neon-purple)';

                if (pos === 0) {
                    document.getElementById('modalQuestion').innerText = '走讀起點 (Meander Taipei)：請設定大家今天的學習北極星與身心估點！';
                    document.getElementById('modalAnswer').innerText = '設定不可觸犯的底線與期待。';
                    recordIcon = '🏠';
                    recordColor = 'var(--neon-purple)';
                    recordLabel = '出發：Meander Taipei';
                    recordDetail = '請設定大家今天的學習北極星與身心估點！';
                } else {
                    document.getElementById('modalQuestion').innerText = '抵達終點 (CollaPlay)！現在讓我們進行最後的「復盤」，回顧今天的收穫。';
                    document.getElementById('modalAnswer').innerText = '先望海再造船，共創理想的生活！';
                    recordIcon = '🏁';
                    recordColor = 'var(--neon-purple)';
                    recordLabel = '抵達終點：CollaPlay';
                    recordDetail = '進行最後的「復盤」，回顧今天的收穫。';
                }
            } else {
                // 隨機抽取一個西門町推薦景點（與機會/命運抽卡邏輯相同）
                const card = drawUnique(spotPool, usedSpotIndices);
                cardGraphic.innerText = `📍 走讀景點：\n\n${card.name}`;
                cardGraphic.style.border = '2px solid var(--neon-blue)';
                cardGraphic.style.boxShadow = 'inset 0 0 15px rgba(0, 229, 255, 0.3), 0 0 10px rgba(0, 229, 255, 0.5)';
                cardGraphic.style.color = 'var(--neon-blue)';

                showBtn.classList.add('btn-outline-blue');
                answerBox.style.borderLeftColor = 'var(--neon-blue)';
                answerTitle.style.color = 'var(--neon-blue)';

                document.getElementById('modalQuestion').innerText = card.q;
                document.getElementById('modalAnswer').innerText = card.a;

                if (card.lat && card.lng) updateMap(card.lat, card.lng);

                recordIcon = '📍';
                recordColor = 'var(--neon-blue)';
                recordLabel = `景點：${card.name}`;
                recordDetail = card.q;
            }
        }

        // 寫入這位玩家的路線紀錄
        player.history.push({
            step: player.history.length + 1,
            icon: recordIcon,
            color: recordColor,
            label: recordLabel,
            detail: recordDetail
        });
        renderHistory();

        document.getElementById('eventModal').style.display = 'flex';
    }

    function showAnswer() { document.getElementById('answerBox').style.display = 'block'; }

    function awardStone() {
        let lastPlayerIdx = currentPlayerIndex - 1;
        if (lastPlayerIdx < 0) lastPlayerIdx = players.length - 1;
        players[lastPlayerIdx].stones += 1;
        updateUI();
        closeModal();
    }

    function closeModal() {
        document.getElementById('eventModal').style.display = 'none';
        document.getElementById('deck-chance').classList.remove('highlight');
        document.getElementById('deck-fate').classList.remove('highlight');
    }

    // 更新 UI 狀態
    function updateUI() {
        const tbody = document.getElementById('playerList');
        tbody.innerHTML = '';
        
        for (let i = 0; i < boardSpaces.length; i++) {
            let tokenContainer = document.getElementById(`tokens-${i}`);
            let spaceDiv = document.getElementById(`space-${i}`);
            if(tokenContainer) tokenContainer.innerHTML = '';
            if(spaceDiv) spaceDiv.classList.remove('active');
        }

        players.forEach(p => {
            tbody.innerHTML += `
                <tr>
                    <td><span style="display:inline-block; width:10px; height:10px; background:${p.color}; border-radius:50%;"></span> ${p.name}</td>
                    <td>${p.energy}</td>
                    <td><span style="color:var(--u-orange);font-weight:bold; font-size:1.2em;">${p.stones}</span></td>
                    <td>${boardSpaces[p.position].name.replace('<br>','')}</td>
                </tr>
            `;

            const token = document.createElement('div');
            token.className = 'player-token';
            token.style.backgroundColor = p.color;
            token.innerText = p.name.charAt(0);
            token.title = p.name;
            let tokenContainer = document.getElementById(`tokens-${p.position}`);
            if(tokenContainer) tokenContainer.appendChild(token);
        });

        if(players.length > 0) {
            let activeSpace = document.getElementById(`space-${players[currentPlayerIndex].position}`);
            if(activeSpace) activeSpace.classList.add('active');
        }
    }

    function updateTurnIndicator() {
        document.getElementById('turnIndicator').innerText = `👉 現在輪到：${players[currentPlayerIndex].name}`;
        document.getElementById('turnIndicator').style.color = 'var(--neon-green)';
        document.getElementById('turnIndicator').style.textShadow = `0 0 8px var(--neon-green)`;
    }

    // 更新「玩家路線紀錄」的玩家選單
    function refreshHistorySelect() {
        const select = document.getElementById('historyPlayerSelect');
        const prevValue = select.value;
        select.innerHTML = '';

        players.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.innerText = p.name;
            select.appendChild(opt);
        });

        if (prevValue !== '' && players.some(p => String(p.id) === prevValue)) {
            select.value = prevValue;
        } else if (players.length > 0) {
            select.value = players[currentPlayerIndex].id;
        }

        renderHistory();
    }

    // 渲染目前選擇玩家的路線紀錄
    function renderHistory() {
        const logEl = document.getElementById('historyLog');
        const select = document.getElementById('historyPlayerSelect');

        if (players.length === 0) {
            logEl.innerHTML = '<p style="color: var(--u-light-gray); text-align:center; margin:0;">尚無紀錄，加入玩家並開始走讀吧！</p>';
            return;
        }

        const selectedId = parseInt(select.value, 10);
        const player = players.find(p => p.id === selectedId) || players[currentPlayerIndex];

        if (!player || player.history.length === 0) {
            logEl.innerHTML = `<p style="color: var(--u-light-gray); text-align:center; margin:0;">${player ? player.name : ''} 還沒開始走讀喔！</p>`;
            return;
        }

        logEl.innerHTML = player.history.map(entry => `
            <div class="history-entry" style="border-left-color: ${entry.color};">
                <div><span class="step-num">第${entry.step}步</span>${entry.icon} ${entry.label}</div>
                ${entry.detail ? `<div class="history-detail">${entry.detail}</div>` : ''}
            </div>
        `).join('');

        logEl.scrollTop = logEl.scrollHeight;
    }

</script>

</body>
</html>
